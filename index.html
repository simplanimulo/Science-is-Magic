<!DOCTYPE html>
<html>
    <head>
        <title>Science is Magic</title>
        <link rel="icon" href="/star.svg" type="image/svg+xml">
	    <link rel='stylesheet' href='./styles.css'>
    </head>
    <body>
        <div class='horizontal-container main'>
            <div class='vertical-container left'>
                <div class='horizontal-container'>
                    <h2>Science is Magic</h2>
                    <input type='button' id='nextRoundButton' value='Next Round'></input>
                </div>
                <div class='horizontal-container'>
                    <details open>
                        <summary><strong>Round characteristics</strong></summary>
                        <label for="formulaComplexity">Formula Complexity:</label>
                        <input type="number" id='formulaComplexity' min="1" max="10" step="1" value="1"></input>
                        <br />
                        <label for="difficultySelector">Difficulty Level:</label>
                        <select id="difficultySelector">
                            <option value="1" selected>Baby</option>
                            <option value="2">Toddler</option>
                            <option value="3">Diaper Free</option>
                            <option value="custom">Custom</option>
                        </select>

                        <details closed id="detailedRoundCharacteristics">
                            <summary><strong>Detailed round characteristics</strong></summary>
                            <label for="formulaOperations">Formula Operations:</label>
                            <select id="formulaOperations">
                                <option value="tier1">+ - * /</option>
                                <option value="tier2">+ - * / min max</option>
                            </select>
                            <br /> <br />

                            <label>Spell Variable Power Frequencies:</label> <br />
                            <div class='horizontal-container'>
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">1</label>
                                </div >
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">1/2</label>
                                </div >
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">2</label>
                                </div >
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">1/3</label>
                                </div >
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">3</label>
                                </div >
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">1/4</label>
                                </div >
                                <div class="vertical-container" style="width:4ch">
                                    <input type="number" class="powerInput" style="width:4ch" min="0" step="1">
                                    <label style="width:4ch; text-align:center">4</label>
                                </div >
                            </div>
                            <br />

                            <label>Formula Leaf Type Frequencies:</label> <br />
                            <div class='horizontal-container'>
                                <div class="vertical-container" style="width:5ch">
                                    <input type="number" class="leafTypeInput" style="width:5ch" min="0" step="1">
                                    <label style="width:5ch; text-align:center">Sp.Var</label>
                                </div >
                                <div class="vertical-container" style="width:5ch">
                                    <input type="number" class="leafTypeInput" style="width:5ch" min="0" step="1">
                                    <label style="width:5ch; text-align:center">Real</label>
                                </div >
                                <div class="vertical-container" style="width:5ch">
                                    <input type="number" class="leafTypeInput" style="width:5ch" min="0" step="1">
                                    <label style="width:5ch; text-align:center">Int</label>
                                </div >
                                <div class="vertical-container" style="width:5ch">
                                    <input type="number" class="leafTypeInput" style="width:5ch" min="0" step="1">
                                    <label style="width:5ch; text-align:center">N(0,1)</label>
                                </div >
                            </div>
                            <br />

                            <div class='horizontal-container'>
                                <div class="vertical-container" style="width:10ch; justify-content: center">
                                    <input type="number" id="constMin" style="width:10ch" min="0" step="1">
                                    <label style="width:9ch; text-align:center">Const. Min</label>
                                </div >
                                <div class="vertical-container" style="width:10ch; justify-content: center">
                                    <input type="number" id="constMax" style="width:10ch" min="0" step="1">
                                    <label style="width:9ch; text-align:center">Const. Max</label>
                                </div >
                                <div class="vertical-container" style="width:10ch; justify-content: center">
                                    <input type="number" id="SVLPercentMin" style="width:10ch" min="0" step="5">
                                    <label style="width:9ch; text-align:center">SVL% Min</label>
                                </div >
                                <div class="vertical-container" style="width:10ch; justify-content: center">
                                    <input type="number" id="SVLPercentMax" style="width:10ch" min="0" step="5">
                                    <label style="width:9ch; text-align:center">SVL% Max</label>
                                </div >
                            </div>
                            <br />

                            <label for="variableSettingInaccuracy">Spell Variable Setting Inaccuracy:</label>
                            <input type="number" id="variableSettingInaccuracy" style="width:7ch" min="0" step="0.05">
                            <br />

                            <label for="resultMeasurementInaccuracy">Result Measurement Inaccuracy:</label>
                            <input type="number" id="resultMeasurementInaccuracy" style="width:7ch" min="0" step="0.05">
                            <br />
                        </details>
                    </details>
                </div>
                <div>
                    <h3 id = "spellName">Spell</h3>
                    <p id="spell description" class = 'spaced-lines'></p>
                </div>
                <div>
                    <h3>Perform a magical experiment</h3>
                    <input id="experiment parameters">
                    <label for="gamesPerPlayerPair">Experiment parameters</label>
                    <br></br>
                    <input type='button' id='runExperimentButton' value='Run Experiment'></input>
                    <input type='button' id='guessRuleButton' value='Guess Rule'></input>
                    <input type='button' id='revealRuleButton' value='Reveal Rule'></input>
                </div>
                <div id = "ruleRevealContainer">
                </div>
                <div>
                    <textarea id="ruleGuessInput" rows="4" cols="40" placeholder="Rule Guess"></textarea>
                </div>
            </div>
            <div class = 'right'>
                <h3>Experiment log</h3>
                <div id="experimentLog" class='vertical-container flow'>
                </div>
            </div>
        </div>
        <script type='module' src='./main.js'></script>
    </body>
</html>
