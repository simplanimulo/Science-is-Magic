<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <textarea id="prompt">Hello</textarea>
        <button id="send">Send</button>
        <pre id="out"></pre>
        <script>

  const response = await fetch('/.netlify/functions/testf');
  const data = await response.json();
  console.log(data.message); // "Hello from Netlify Functions!"


            document.getElementById('send').onclick = async () => {
                const prompt = document.getElementById('prompt').value;
                document.getElementById('out').textContent = 'Loading...';
                try {
                    const r = await fetch('/.netlify/functions/hf', {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ prompt })
                    });
                    const data = await r.json();
                    const text = Array.isArray(data) ? data[0]?.generated_text || JSON.stringify(data) : JSON.stringify(data);
                    document.getElementById('out').textContent = text;
                } catch(e) { document.getElementById('out').textContent = 'Error: '+e.message; }
            };
        </script>
    </body>
</html>
