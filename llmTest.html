console.log('test0');

            document.getElementById('send').onclick = async () => {
                const prompt = document.getElementById('prompt').value;
                document.getElementById('out').textContent = 'Loading...';
                console.log('test2');
                try {
                    console.log('test3');
                    const r = await fetch('/.netlify/functions/hf', {
                        method: 'POST',
